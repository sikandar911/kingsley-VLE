version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BUILD_DATE=${BUILD_DATE}
        - VCS_REF=${VCS_REF}
        - VERSION=${VERSION:-1.0.0}
    image: kingsley-frontend:${VERSION:-1.0.0}
    container_name: kingsley-frontend
    ports:
      - "5001:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - kingsley-network
    labels:
      - "app=kingsley-vle"
      - "service=frontend"
      - "version=${VERSION:-1.0.0}"
      - "build.date=${BUILD_DATE}"
      - "vcs.ref=${VCS_REF}"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  kingsley-network:
    driver: bridge
    name: kingsley-network
