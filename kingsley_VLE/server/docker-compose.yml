version: '3.8'

services:
  kingsley-backend:
    build:
      context: .
      args:
        - BUILD_DATE=${BUILD_DATE}
        - VCS_REF=${VCS_REF}
        - VERSION=${VERSION:-1.0.0}
    image: kingsley-backend:${VERSION:-1.0.0}
    container_name: kingsley-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - prod.env
    networks:
      - kingsley-network
    environment:
      - NODE_ENV=production
    labels:
      - "app=kingsley-vle"
      - "service=backend"
      - "version=${VERSION:-1.0.0}"
      - "build.date=${BUILD_DATE}"
      - "vcs.ref=${VCS_REF}"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    # Optional: Add resource limits
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '0.5'
    #       memory: 512M

networks:
  kingsley-network:
    driver: bridge
    name: kingsley-network
